<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Knowledge Graph Renderer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.2/standalone/umd/vis-network.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; background: #eceff1; }
        #controls { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        textarea { width: 100%; height: 120px; font-family: 'Consolas', monospace; border: 1px solid #cfd8dc; border-radius: 4px; padding: 10px; box-sizing: border-box; }
        button { margin-top: 10px; padding: 10px 25px; background: #2196f3; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: 600; }
        button:hover { background: #1e88e5; }
        #network { flex-grow: 1; border: 1px solid #cfd8dc; border-radius: 8px; background: white; }
    </style>
</head>
<body>

    <div id="controls">
        <textarea id="graphInput" placeholder="Paste tuple data..."></textarea>
        <button onclick="renderGraph()">Generate Graph</button>
    </div>
    
    <div id="network"></div>

    <script>
        const colorPalette = {
            'PERSON': { background: '#bbdefb', border: '#1976d2' },
            'MEANS_OF_TRANSPORTATION': { background: '#fff9c4', border: '#fbc02d' },
            'ORGANIZATION': { background: '#c8e6c9', border: '#388e3c' },
            'ROUTES': { background: '#ffccbc', border: '#e64a19' },
            'DEFAULT': { background: '#f5f5f5', border: '#9e9e9e' }
        };

        function renderGraph() {
            if (typeof vis === 'undefined') {
                alert("Library failed to load. Check your internet connection or CDN availability.");
                return;
            }

            const rawText = document.getElementById("graphInput").value;
            const nodes = [];
            const edges = [];
            const seenNodes = new Set();

            // Updated regex to handle the specific tuple structure and delimiters
            const tupleRegex = /\("([^"]+)"{tuple_delimiter}(.*?)\)/gs;
            let match;

            while ((match = tupleRegex.exec(rawText)) !== null) {
                const type = match[1].toLowerCase();
                const content = match[2];
                const parts = content.split("{tuple_delimiter}").map(p => p.trim());

                if (type === "entity" && parts.length >= 2) {
                    const [id, category, desc] = parts;
                    if (!seenNodes.has(id)) {
                        const style = colorPalette[category] || colorPalette['DEFAULT'];
                        nodes.push({
                            id: id,
                            label: `<b>${id}</b>\n(${category})`,
                            title: desc || "",
                            color: style,
                            shape: 'box',
                            font: { multi: 'html', size: 14 }
                        });
                        seenNodes.add(id);
                    }
                } else if (type === "relationship" && parts.length >= 3) {
                    const [source, target, label] = parts;
                    
                    // Auto-create nodes if relationship appears before entity
                    [source, target].forEach(n => {
                        if (!seenNodes.has(n)) {
                            nodes.push({ id: n, label: `<b>${n}</b>`, shape: 'box', font: { multi: 'html' }, color: colorPalette['DEFAULT'] });
                            seenNodes.add(n);
                        }
                    });

                    edges.push({
                        from: source,
                        to: target,
                        label: label,
                        arrows: 'to',
                        font: { size: 12, strokeWidth: 2, strokeColor: '#ffffff' },
                        color: { color: '#546e7a' }
                    });
                }
            }

            const data = { nodes: new vis.DataSet(nodes), edges: new vis.DataSet(edges) };
            const options = {
                physics: { 
                    enabled: true, 
                    solver: 'forceAtlas2Based',
                    forceAtlas2Based: { gravitationalConstant: -100, springLength: 200 }
                },
                layout: { randomSeed: 42 }
            };

            new vis.Network(document.getElementById("network"), data, options);
        }

        // Default Load
        window.onload = () => {
            document.getElementById("graphInput").value = `("entity"{tuple_delimiter}SAI DESHPANDE{tuple_delimiter}PERSON{tuple_delimiter}A known smuggler responsible for transporting migrants in an 18-wheeler)\n{record_delimiter}\n("entity"{tuple_delimiter}SMUGGLER{tuple_delimiter}PERSON{tuple_delimiter}An individual engaged in illegal human smuggling activities)\n{record_delimiter}\n("entity"{tuple_delimiter}18-WHEELER{tuple_delimiter}MEANS_OF_TRANSPORTATION{tuple_delimiter}A large truck used for smuggling operations)\n{record_delimiter}\n("relationship"{tuple_delimiter}SAI DESHPANDE{tuple_delimiter}SMUGGLER{tuple_delimiter}Sai Deshpande is identified as a smuggler involved in this case{tuple_delimiter}8)\n{record_delimiter}\n("relationship"{tuple_delimiter}SAI DESHPANDE{tuple_delimiter}18-WHEELER{tuple_delimiter}Sai Deshpande drove the 18-wheeler carrying undocumented migrants{tuple_delimiter}8)\n{record_delimiter}\n{completion_delimiter}`;
            renderGraph();
        };
    </script>
</body>
</html>
